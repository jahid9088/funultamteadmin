--- START OF FILE ---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚡ ULTRA ADMIN | ULTIMATE MAX PRO</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg: #010409;
      --surface: #0d1117;
      --card: #161b22;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --text: #c9d1d9;
      --text-bright: #ffffff;
      --text-dim: #8b949e;
      --danger: #f85149;
      --success: #238636;
      --owner: #d29922;
      --border: #30363d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* --- TOP MULTI-DB NAV --- */
    .db-container {
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 2000; padding: 0.8rem;
      display: flex; gap: 0.8rem; overflow-x: auto; scrollbar-width: none;
    }
    .db-container::-webkit-scrollbar { display: none; }
    
    .db-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 0.7rem 1.2rem; border-radius: 14px; min-width: 140px;
      position: relative; transition: 0.3s;
    }
    .db-card.active { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }
    .db-card .db-title { font-weight: 800; font-size: 0.85rem; color: var(--text-bright); display: block; }
    .db-card .db-count { font-size: 0.7rem; color: var(--accent); font-weight: 600; }
    .db-card .db-actions { position: absolute; top: 5px; right: 8px; display: flex; gap: 5px; opacity: 0.3; }
    .db-card:hover .db-actions { opacity: 1; }
    .action-icon { font-size: 0.7rem; cursor: pointer; color: var(--text-dim); }

    .add-btn {
      min-width: 50px; background: var(--success); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff;
    }

    /* --- DASHBOARD --- */
    header { padding: 1.5rem 1.2rem 0.5rem 1.2rem; display: flex; justify-content: space-between; align-items: center; }
    .brand-logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(to right, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; padding: 1.2rem; }
    .stat-box { background: var(--card); border: 1px solid var(--border); padding: 1.2rem; border-radius: 20px; }
    .stat-box span { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .stat-box h2 { font-size: 1.5rem; color: var(--text-bright); margin-top: 5px; }

    /* --- BATCH ENGINE --- */
    .engine-box {
      margin: 0 1.2rem 1.5rem 1.2rem; background: #0d1117; 
      border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border);
    }
    .select-pro {
      width: 100%; background: #010409; border: 1px solid var(--border);
      color: #fff; padding: 0.8rem; border-radius: 12px; margin-bottom: 1.2rem; outline: none;
    }

    .btn-row { display: flex; gap: 0.6rem; }
    .btn { padding: 0.8rem; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; flex: 1; transition: 0.2s; }
    .btn-danger { background: rgba(248, 81, 73, 0.1); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.2); }
    .btn-accent { background: var(--accent); color: #0d1117; }

    /* --- SEARCH & VIRTUAL LIST --- */
    .search-area { padding: 0 1.2rem 1.2rem 1.2rem; position: sticky; top: 80px; z-index: 1000; background: var(--bg); }
    .search-input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      padding: 1.1rem; border-radius: 16px; color: #fff; font-size: 1rem; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    .ultra-list { margin: 0 1.2rem; border-radius: 20px; overflow: hidden; background: var(--card); border: 1px solid var(--border); }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } }
    
    .u-mob { font-weight: 800; color: var(--text-bright); font-size: 1.05rem; }
    .u-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
    .badge { font-size: 0.6rem; padding: 3px 6px; border-radius: 5px; font-weight: 900; vertical-align: middle; }
    .badge-owner { background: var(--owner); color: #000; }

    /* --- OVERLAYS --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 1.5rem; backdrop-filter: blur(10px); }
    .modal-overlay.active { display: flex; }
    .modal-card { background: var(--card); padding: 2rem; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border); }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 800; opacity: 0; z-index: 9999; transition: 0.3s; }
    .toast.show { opacity: 1; bottom: 40px; }

    .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 2rem; z-index: 1001; box-shadow: 0 10px 25px var(--accent-glow); }
  </style>
</head>
<body>

<div id="dbListNav" class="db-container">
  <!-- DB Cards Dynamic -->
  <div class="add-btn" onclick="openModal('dbAddModal')">+</div>
</div>

<header>
  <div class="brand-logo">ULTRA MAX PRO</div>
  <button class="btn btn-accent" style="width:auto; padding:0.5rem 1.2rem; font-size:0.7rem;" onclick="exportCSV()">CSV EXPORT</button>
</header>

<div class="stats-grid">
  <div class="stat-box"><span>Records in DB</span><h2 id="totalCount">0</h2></div>
  <div class="stat-box"><span>Live Brands</span><h2 id="brandCount">0</h2></div>
</div>

<div class="engine-box">
  <select id="brandSelect" class="select-pro" onchange="renderLazy()"></select>
  <div class="btn-row">
    <button class="btn btn-danger" onclick="turboPurge(100)">100</button>
    <button class="btn btn-danger" onclick="turboPurge(500)">500</button>
    <button class="btn btn-danger" style="flex:2; background:var(--danger); color:#fff;" onclick="turboPurge('ALL')">PURGE ALL</button>
  </div>
</div>

<div class="search-area">
  <input type="text" id="searchInput" class="search-input" placeholder="Turbo Search (100k+ Data Support)..." oninput="renderLazy()">
</div>

<div id="userContainer" class="ultra-list"></div>

<div class="fab" onclick="openModal('ownerModal')">+</div>

<!-- MODAL: ADD DB -->
<div class="modal-overlay" id="dbAddModal">
  <div class="modal-card">
    <h3 style="margin-bottom:1.2rem;">Connect New Admin</h3>
    <input type="text" id="newDbName" class="search-input" placeholder="Admin Name (e.g. Admin 2)" style="margin-bottom:1rem;">
    <input type="text" id="newDbUrl" class="search-input" placeholder="Firebase Database URL" style="margin-bottom:1.5rem;">
    <div class="btn-row">
      <button class="btn btn-accent" onclick="saveNewDb()">CONNECT</button>
      <button class="btn" style="background:#30363d; color:#fff;" onclick="closeModal('dbAddModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: EDIT DB -->
<div class="modal-overlay" id="dbEditModal">
  <div class="modal-card">
    <h3 style="margin-bottom:1.2rem;">Rename Admin</h3>
    <input type="text" id="editDbName" class="search-input" style="margin-bottom:1.5rem;">
    <div class="btn-row">
      <button class="btn btn-accent" onclick="confirmRename()">UPDATE</button>
      <button class="btn" style="background:#30363d; color:#fff;" onclick="closeModal('dbEditModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: OWNER -->
<div class="modal-overlay" id="ownerModal">
  <div class="modal-card">
    <h3 style="margin-bottom:1rem;">Add Ultra Owner</h3>
    <p style="color:var(--text-dim); font-size:0.8rem; margin-bottom:1.5rem;">Protected from all bulk deletion engines.</p>
    <input type="number" id="ownerMob" class="search-input" placeholder="Enter Mobile" style="margin-bottom:1.5rem;">
    <div class="btn-row">
      <button class="btn btn-accent" onclick="addOwner()">ADD SAFE</button>
      <button class="btn" style="background:#30363d; color:#fff;" onclick="closeModal('ownerModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: PROGRESS -->
<div class="modal-overlay" id="pgModal">
  <div class="modal-card" style="text-align:center;">
    <h3 id="pgTitle">Vaporizing...</h3>
    <div style="height:6px; background:#010409; border-radius:10px; margin:20px 0; overflow:hidden; border:1px solid var(--border);">
      <div id="pgBar" style="height:100%; width:0%; background:var(--accent); transition:0.1s;"></div>
    </div>
    <b id="pgStats" style="color:var(--accent); font-size:1.2rem;">0 / 0</b>
  </div>
</div>

<div class="toast" id="toast">Operation Successful</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  let configs = JSON.parse(localStorage.getItem('ultra_configs')) || [
    { name: 'Admin 1', url: 'https://funultimate-345ed-default-rtdb.firebaseio.com' }
  ];
  
  let currentIdx = 0;
  let activeData = [];
  let activeRef = null;
  let isLocked = false;
  let editIdx = null;

  // --- ULTIMATE FAST LOADING ---
  function init() {
    renderTabs();
    switchDb(currentIdx);
    startBackgroundSyncer();
  }

  function renderTabs() {
    const nav = document.getElementById('dbListNav');
    nav.querySelectorAll('.db-card').forEach(c => c.remove());
    
    configs.forEach((db, i) => {
      const card = document.createElement('div');
      card.className = `db-card ${i === currentIdx ? 'active' : ''}`;
      card.onclick = () => switchDb(i);
      card.innerHTML = `
        <div class="db-actions">
          <span class="action-icon" onclick="openRename(${i}, event)">✎</span>
          <span class="action-icon" style="color:var(--danger)" onclick="deleteDb(${i}, event)">✕</span>
        </div>
        <span class="db-title">${db.name}</span>
        <span class="db-count" id="count-bg-${i}">Loading...</span>
      `;
      nav.insertBefore(card, nav.querySelector('.add-btn'));
    });
  }

  // --- LIVE BACKGROUND SYNC (No Lag) ---
  function startBackgroundSyncer() {
    configs.forEach((dbConf, i) => {
      try {
        const appName = `sync_${i}`;
        let app = firebase.apps.find(a => a.name === appName) || firebase.initializeApp({ databaseURL: dbConf.url }, appName);
        app.database().ref("dbRef").on("value", snap => {
          const count = snap.numChildren();
          const el = document.getElementById(`count-bg-${i}`);
          if(el) el.innerText = count.toLocaleString() + " Nos";
          if(i === currentIdx) updateMainStats(snap.val());
        });
      } catch(e) {}
    });
  }

  function switchDb(idx) {
    if(isLocked) return;
    currentIdx = idx;
    const config = configs[idx];
    
    if(activeRef) activeRef.off();
    
    const appName = `sync_${idx}`;
    const app = firebase.apps.find(a => a.name === appName);
    activeRef = app.database().ref("dbRef");
    
    renderTabs();
    showToast(`Switched to ${config.name}`);
  }

  function updateMainStats(data) {
    if(!data) { activeData = []; renderLazy(); return; }
    
    const temp = [];
    const brands = new Set();
    for(let key in data) {
      temp.push({ id: key, ...data[key] });
      if(data[key].brand && data[key].brand !== 'Owner') brands.add(data[key].brand);
    }
    activeData = temp.reverse();
    
    document.getElementById('totalCount').innerText = activeData.length.toLocaleString();
    document.getElementById('brandCount').innerText = brands.size;

    const select = document.getElementById('brandSelect');
    const curVal = select.value;
    select.innerHTML = '<option value="">Global Filter (All Brands)</option>';
    [...brands].sort().forEach(b => {
      const count = activeData.filter(u => u.brand === b).length;
      select.innerHTML += `<option value="${b}">${b} (${count})</option>`;
    });
    select.value = curVal;
    renderLazy();
  }

  // --- VIRTUAL DOM (SUPER FAST) ---
  function renderLazy() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const brand = document.getElementById('brandSelect').value;
    const container = document.getElementById('userContainer');

    let filtered = activeData;
    if(brand) filtered = filtered.filter(u => u.brand === brand);
    if(term) filtered = filtered.filter(u => u.mobile.includes(term) || (u.ip && u.ip.includes(term)));

    const slice = filtered.slice(0, 50); // Makkhan speed
    
    if(slice.length === 0) {
      container.innerHTML = '<p style="padding:3rem; text-align:center; color:var(--text-dim);">No Data Found</p>';
      return;
    }

    container.innerHTML = slice.map(u => {
      const isOwner = u.brand === 'Owner';
      return `
        <div class="row">
          <div class="u-info">
            <span class="u-mob">${u.mobile} ${isOwner ? '<span class="badge badge-owner">OWNER</span>' : ''}</span>
            <div class="u-sub">${u.ip || '0.0.0.0'} • <span style="color:var(--accent)">${u.brand || 'User'}</span></div>
          </div>
          <button class="btn-danger" style="padding:5px 12px; width:auto; font-size:0.7rem;" 
            ${isOwner ? 'disabled' : ''} onclick="deleteSingle('${u.id}')">
            ${isOwner ? 'SAFE' : 'DEL'}
          </button>
        </div>
      `;
    }).join('');
  }

  // --- TURBO PURGE ENGINE ---
  async function turboPurge(limit) {
    const brand = document.getElementById('brandSelect').value;
    let targets = activeData.filter(u => u.brand !== 'Owner');
    
    if(brand) targets = targets.filter(u => u.brand === brand);
    if(limit !== 'ALL') targets = targets.slice(0, limit);

    if(!targets.length) return showToast("No records to purge.");
    if(!confirm(`DANGER: Delete ${targets.length} entries? Owners are safe.`)) return;

    isLocked = true;
    openModal('pgModal');
    
    const total = targets.length;
    const batchSize = 200;
    for(let i=0; i<targets.length; i+=batchSize) {
      const chunk = targets.slice(i, i+batchSize);
      const updates = {};
      chunk.forEach(u => updates[u.id] = null);
      await activeRef.update(updates);
      
      const done = Math.min(i + batchSize, total);
      document.getElementById('pgBar').style.width = (done/total)*100 + "%";
      document.getElementById('pgStats').innerText = `${done} / ${total}`;
    }

    isLocked = false;
    closeModal('pgModal');
    showToast("Database Purged Successfully");
  }

  // --- DB MANAGEMENT ---
  function saveNewDb() {
    const name = document.getElementById('newDbName').value.trim();
    const url = document.getElementById('newDbUrl').value.trim();
    if(!name || !url) return;
    configs.push({ name, url });
    saveAndReload();
    closeModal('dbAddModal');
  }

  function openRename(idx, e) {
    e.stopPropagation();
    editIdx = idx;
    document.getElementById('editDbName').value = configs[idx].name;
    openModal('dbEditModal');
  }

  function confirmRename() {
    const newName = document.getElementById('editDbName').value.trim();
    if(!newName) return;
    configs[editIdx].name = newName;
    saveAndReload();
    closeModal('dbEditModal');
  }

  function deleteDb(idx, e) {
    e.stopPropagation();
    if(configs.length === 1) return showToast("At least 1 DB required");
    if(!confirm("Remove this Admin configuration?")) return;
    configs.splice(idx, 1);
    if(currentIdx >= configs.length) currentIdx = 0;
    saveAndReload();
  }

  function saveAndReload() {
    localStorage.setItem('ultra_configs', JSON.stringify(configs));
    location.reload(); // Hard reload for clean Firebase instance
  }

  // --- HELPERS ---
  function addOwner() {
    const mob = document.getElementById('ownerMob').value.trim();
    if(!mob) return;
    activeRef.child(mob).set({
      mobile: mob, brand: "Owner", ip: "Internal_Safe",
      time: new Date().toLocaleString('en-GB'), balance: "0", battery: "100%"
    });
    showToast("Safe Owner Added");
    closeModal('ownerModal');
  }

  async function deleteSingle(id) {
    if(confirm("Delete entry?")) await activeRef.child(id).remove();
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  
  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function exportCSV() {
    let csv = "Mobile,Brand,IP,Time\n";
    activeData.forEach(u => csv += `${u.mobile},${u.brand},${u.ip},${u.time}\n`);
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${configs[currentIdx].name}_Data.csv`;
    a.click();
  }

  init();
</script>

</body>
</html>
