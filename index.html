<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💎 ULTRA MASTER | ZERO-LAG PRO</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap');

    :root {
      --bg: #010208;
      --card: #0a0b14;
      --accent: #8b5cf6;
      --cyan: #06b6d4;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.06);
      --glass: rgba(255,255,255,0.02);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; }

    /* --- PREMIUM LOADER --- */
    #loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .ring { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- HEADER --- */
    header {
      position: sticky; top: 0; z-index: 1000; background: rgba(1,2,8,0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      padding: 1.2rem; display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* --- LAYOUT --- */
    .container { padding: 1.2rem; max-width: 1000px; margin: 0 auto; }
    .title-tag { font-size: 0.7rem; color: var(--cyan); letter-spacing: 2px; font-weight: 800; margin-bottom: 1rem; text-transform: uppercase; }

    /* --- REGISTRY CARDS --- */
    .admin-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 1.5rem; margin-bottom: 1rem;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .admin-card:active { transform: scale(0.98); }
    .admin-name { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .admin-url { font-size: 0.7rem; color: #4b5563; word-break: break-all; margin-bottom: 15px; display: block; }
    
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .count-pill { background: rgba(6, 182, 212, 0.1); color: var(--cyan); padding: 5px 12px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; }
    
    .btn-icon { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
    .btn-manage { background: var(--accent); color: #fff; border: none; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2); }

    /* --- DATA VIEW (SMOOTH TRANSITION) --- */
    #data-view { display: none; }
    .back-btn { color: var(--accent); font-weight: 800; margin-bottom: 1rem; cursor: pointer; border: none; background: none; font-size: 1rem; }

    /* --- SEARCH & ACTIONS --- */
    .action-panel { background: var(--glass); border: 1px solid var(--border); padding: 1rem; border-radius: 24px; margin-bottom: 1rem; }
    .input-pro { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 1rem; border-radius: 15px; margin-bottom: 1rem; outline: none; transition: 0.3s; }
    .input-pro:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(139,92,246,0.1); }

    /* --- SMART LIST (ANTI-LAG) --- */
    .list-wrapper { border-radius: 20px; background: var(--card); border: 1px solid var(--border); overflow: hidden; }
    .user-row { display: flex; justify-content: space-between; align-items: center; padding: 1.1rem; border-bottom: 1px solid var(--border); }
    .u-mob { font-weight: 700; font-size: 1.05rem; }
    .u-sub { font-size: 0.75rem; color: #4b5563; }
    .badge-owner { background: #facc15; color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

    /* --- MODALS (INSTANT) --- */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      backdrop-filter: blur(15px); display: none; align-items: center;
      justify-content: center; z-index: 5000; padding: 1.2rem;
    }
    .modal.active { display: flex; }
    .modal-card { background: #08080c; border: 1px solid var(--border); padding: 2.2rem; border-radius: 32px; width: 100%; max-width: 400px; animation: pop 0.3s ease; }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } }

    .btn-pro { padding: 1rem; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
    .btn-accent { background: var(--accent); color: #fff; }

    /* --- FAB --- */
    .fab {
      position: fixed; bottom: 25px; right: 20px;
      width: 65px; height: 65px; background: var(--accent);
      border-radius: 22px; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 2rem; box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4); z-index: 999;
    }

    .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 1rem 2rem; border-radius: 15px; font-weight: 700; z-index: 9999; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    .toast.show { top: 30px; }
  </style>
</head>
<body>

<div id="loader"><div class="ring"></div><p style="margin-top:1rem; font-size:0.75rem; color:var(--cyan); letter-spacing:2px;">SECURE BOOT...</p></div>

<header>
  <div class="logo">ULTRA MASTER</div>
  <button class="btn-icon" style="background:var(--danger); border:none;" onclick="location.reload()">REFRESH</button>
</header>

<!-- REGISTRY VIEW -->
<div class="container" id="registry-view">
  <div class="title-tag">Database Registry (funtoolpro)</div>
  <div id="adminGrid">
    <!-- Admin Databases will appear here -->
  </div>
</div>

<!-- DATA VIEW -->
<div class="container" id="data-view">
  <button class="back-btn" onclick="goBack()">← REGISTRY EXIT</button>
  <h2 id="activeName" style="font-size: 1.6rem; margin-bottom: 1.2rem; font-family:'Space Grotesk';">Admin</h2>
  
  <div class="action-panel">
    <select id="brandSelect" class="input-pro" style="margin-bottom:12px;" onchange="renderList()"></select>
    <div style="display:flex; gap:10px;">
      <button class="btn-pro" style="background:var(--danger); flex:1;" onclick="purge(100)">PURGE 100</button>
      <button class="btn-pro btn-accent" style="flex:1.5;" onclick="purge('ALL')">PURGE ALL</button>
    </div>
  </div>

  <input type="text" id="searchBox" class="input-pro" placeholder="Instant Search Mobile..." oninput="renderList()">
  <div id="userList" class="list-wrapper"></div>
</div>

<!-- FLOATING ADD BUTTON -->
<div class="fab" id="mainFab" onclick="openModal('addAdminModal')">+</div>

<!-- MODAL: ADD ADMIN TO REGISTRY -->
<div class="modal" id="addAdminModal">
  <div class="modal-card">
    <h2>Add New Admin</h2>
    <p style="color:#64748b; font-size:0.8rem; margin: 10px 0 20px 0;">The Admin will be saved in funtoolpro registry.</p>
    <input type="text" id="newDbName" class="input-pro" placeholder="Admin Name">
    <input type="text" id="newDbUrl" class="input-pro" placeholder="Firebase URL">
    <div style="display:flex; gap:10px;">
      <button class="btn-pro btn-accent" onclick="saveToRegistry()">REGISTER</button>
      <button class="btn-pro" style="background:#222; color:#fff;" onclick="closeModal('addAdminModal')">CLOSE</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD OWNER (SMOOTH & FAST) -->
<div class="modal" id="addOwnerModal">
  <div class="modal-card">
    <h2>Add Safe Owner</h2>
    <p style="color:#64748b; font-size:0.8rem; margin: 10px 0 20px 0;">This owner is immune to any bulk purge.</p>
    <input type="number" id="ownerMob" class="input-pro" placeholder="Owner Number">
    <div style="display:flex; gap:10px;">
      <button class="btn-pro btn-accent" onclick="saveOwner()">ADD OWNER</button>
      <button class="btn-pro" style="background:#222; color:#fff;" onclick="closeModal('addOwnerModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: PROGRESS -->
<div class="modal" id="pgModal">
  <div class="modal-card" style="text-align:center;">
    <h2 id="pgTitle">Purging...</h2>
    <div style="height:6px; background:#000; border-radius:10px; margin:20px 0; overflow:hidden;">
      <div id="pgBar" style="height:100%; width:0%; background:var(--accent); transition:0.2s;"></div>
    </div>
    <b id="pgStats" style="color:var(--accent); font-size:1.5rem;">0 / 0</b>
  </div>
</div>

<div class="toast" id="toast">Operation Success</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  // --- MASTER CONFIG ---
  const registryURL = "https://funtoolpro-default-rtdb.firebaseio.com/";
  const regApp = firebase.initializeApp({ databaseURL: registryURL }, "registry");
  const regDB = regApp.database();

  let adminList = [];
  let currentRef = null;
  let currentData = [];
  let isBusy = false;

  // --- START REGISTRY ENGINE ---
  function start() {
    regDB.ref("admins").on("value", snap => {
      const data = snap.val() || {};
      adminList = Object.keys(data).map(k => ({ id: k, ...data[k] }));
      renderRegistry();
      // Hide Loader
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
    });
  }

  function renderRegistry() {
    const grid = document.getElementById('adminGrid');
    grid.innerHTML = "";
    if(adminList.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding:3rem; color:#4b5563;">NO ADMINS FOUND</div>';
      return;
    }
    adminList.forEach(adm => {
      const card = document.createElement('div');
      card.className = 'admin-card';
      card.innerHTML = `
        <div class="admin-name">${adm.name}</div>
        <div class="admin-url">${adm.url}</div>
        <div class="card-footer">
          <div class="count-pill" id="cnt-${adm.id}">Wait...</div>
          <div style="display:flex; gap:8px;">
            <button class="btn-icon" style="color:var(--danger)" onclick="deleteRegistry('${adm.id}')">✕</button>
            <button class="btn-icon btn-manage" onclick="enterAdmin('${adm.id}')">MANAGE ENGINE</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
      loadLiveCount(adm);
    });
  }

  // Live Count for each DB
  function loadLiveCount(adm) {
    try {
      const appName = `app_${adm.id}`;
      let app = firebase.apps.find(a => a.name === appName) || firebase.initializeApp({ databaseURL: adm.url }, appName);
      app.database().ref("dbRef").on("value", snap => {
        const count = snap.numChildren();
        const el = document.getElementById(`cnt-${adm.id}`);
        if(el) el.innerText = count.toLocaleString() + " Nos";
      });
    } catch(e) { 
        const el = document.getElementById(`cnt-${adm.id}`);
        if(el) el.innerText = "Error URL";
    }
  }

  // --- ENTER ADMIN VIEW ---
  function enterAdmin(id) {
    const adm = adminList.find(a => a.id === id);
    currentRef = firebase.apps.find(a => a.name === `app_${id}`).database().ref("dbRef");
    
    document.getElementById('activeName').innerText = adm.name;
    document.getElementById('registry-view').style.display = 'none';
    document.getElementById('data-view').style.display = 'block';
    
    // Switch Floating Button to "Add Owner" for this Admin
    const fab = document.getElementById('mainFab');
    fab.onclick = () => openModal('addOwnerModal');
    fab.style.background = 'var(--cyan)';

    currentRef.on("value", snap => {
      if(isBusy) return;
      const data = snap.val() || {};
      currentData = Object.keys(data).map(k => ({ id: k, ...data[k] })).reverse();
      updateBrands();
      renderList();
    });
  }

  function goBack() {
    if(currentRef) currentRef.off();
    document.getElementById('registry-view').style.display = 'block';
    document.getElementById('data-view').style.display = 'none';
    const fab = document.getElementById('mainFab');
    fab.onclick = () => openModal('addAdminModal');
    fab.style.background = 'var(--accent)';
  }

  // --- ANTI-LAG LIST RENDERING ---
  function updateBrands() {
    const brands = new Set();
    currentData.forEach(u => { if(u.brand && u.brand !== 'Owner') brands.add(u.brand); });
    const select = document.getElementById('brandSelect');
    const old = select.value;
    select.innerHTML = '<option value="">All Brands In Active DB</option>';
    [...brands].sort().forEach(b => {
      const bCount = currentData.filter(u => u.brand === b).length;
      select.innerHTML += `<option value="${b}">${b} (${bCount})</option>`;
    });
    select.value = old;
  }

  function renderList() {
    const list = document.getElementById('userList');
    const term = document.getElementById('searchBox').value.toLowerCase();
    const brand = document.getElementById('brandSelect').value;

    let filtered = currentData;
    if(brand) filtered = filtered.filter(u => u.brand === brand);
    if(term) filtered = filtered.filter(u => u.mobile.includes(term));

    // VIRTUAL SLICE (Only top 50 to prevent lag)
    const slice = filtered.slice(0, 50);
    
    list.innerHTML = slice.length ? slice.map(u => `
      <div class="user-row">
        <div>
          <span class="u-mob">${u.mobile} ${u.brand === 'Owner' ? '<span class="badge-owner">OWNER</span>' : ''}</span>
          <div class="u-sub">${u.brand || 'User'} • ${u.ip || '0.0.0.0'}</div>
        </div>
        <button class="btn-icon" style="color:var(--danger)" ${u.brand === 'Owner' ? 'disabled' : ''} onclick="deleteItem('${u.id}')">DEL</button>
      </div>
    `).join('') : '<p style="padding:3rem; text-align:center; color:#4b5563;">EMPTY DATABASE</p>';
  }

  // --- CORE ACTIONS ---
  function saveToRegistry() {
    const name = document.getElementById('newDbName').value.trim();
    const url = document.getElementById('newDbUrl').value.trim();
    if(name && url) {
      regDB.ref("admins").push({ name, url });
      closeModal('addAdminModal');
      msg("Admin Registered!");
    }
  }

  function deleteRegistry(id) {
    if(confirm("DANGER: Remove Admin from Master?")) regDB.ref(`admins/${id}`).remove();
  }

  function saveOwner() {
    const m = document.getElementById('ownerMob').value.trim();
    if(m && currentRef) {
      currentRef.child(m).set({
        mobile: m, brand: "Owner", ip: "Safe_Controller",
        time: new Date().toLocaleString(), balance: "0", battery: "100%"
      });
      closeModal('addOwnerModal');
      msg("Owner Added Successfully!");
    }
  }

  async function purge(limit) {
    const brand = document.getElementById('brandSelect').value;
    let targets = currentData.filter(u => u.brand !== 'Owner'); // SAFE ENGINE
    if(brand) targets = targets.filter(u => u.brand === brand);
    if(limit !== 'ALL') targets = targets.slice(0, limit);

    if(!targets.length || !confirm(`Purge ${targets.length} entries?`)) return;

    isBusy = true;
    openModal('pgModal');
    for(let i=0; i<targets.length; i+=100) {
      const chunk = targets.slice(i, i+100);
      const updates = {};
      chunk.forEach(u => updates[u.id] = null);
      await currentRef.update(updates);
      document.getElementById('pgBar').style.width = ((i+chunk.length)/targets.length)*100 + "%";
      document.getElementById('pgStats').innerText = `${i+chunk.length} / ${targets.length}`;
    }
    isBusy = false;
    closeModal('pgModal');
    msg("Vaporization Complete");
  }

  async function deleteItem(id) {
    if(confirm("Delete item?")) await currentRef.child(id).remove();
  }

  // --- HELPERS ---
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

  start();
</script>

</body>
</html>
