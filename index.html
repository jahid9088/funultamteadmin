<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💎 CYBER ADMIN | V4 FIXED</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg: #03000a;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #8b5cf6;
      --cyan: #06b6d4;
      --danger: #ff4d4d;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --owner: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg); color: var(--text); overflow-x: hidden;
      background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #03000a 70%);
      min-height: 100vh;
    }

    /* --- LOADER --- */
    #main-loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .loader-glow {
      width: 50px; height: 50px; border: 3px solid var(--glass-border);
      border-top: 3px solid var(--cyan); border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 15px var(--cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- TOP NAV --- */
    .top-nav {
      position: sticky; top: 0; z-index: 1000;
      padding: 1rem; background: rgba(3, 0, 10, 0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
      display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none;
    }
    .top-nav::-webkit-scrollbar { display: none; }

    .admin-pill {
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 0.7rem 1.2rem; border-radius: 18px; min-width: 140px;
      position: relative; transition: 0.3s; flex-shrink: 0; cursor: pointer;
    }
    .admin-pill.active {
      background: rgba(139, 92, 246, 0.2); border-color: var(--accent);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }
    .admin-pill .name { font-weight: 800; font-size: 0.9rem; color: #fff; display: block; }
    .admin-pill .count { font-size: 0.75rem; color: var(--cyan); font-weight: 700; font-family: 'Space Grotesk'; }
    
    .pill-actions { position: absolute; top: 6px; right: 8px; display: flex; gap: 8px; opacity: 0; }
    .admin-pill:hover .pill-actions { opacity: 1; }
    .icon-btn { font-size: 0.75rem; color: #fff; background: #000; padding: 2px 6px; border-radius: 6px; }

    /* --- MAIN CONTENT --- */
    .container { padding: 1.5rem; max-width: 800px; margin: 0 auto; }
    .logo-header { font-family: 'Space Grotesk'; font-weight: 800; font-size: 1.6rem; margin-bottom: 1.5rem; color: #fff; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 1.2rem; border-radius: 22px; }
    .stat-card span { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .stat-card h2 { font-size: 1.8rem; font-family: 'Space Grotesk'; color: #fff; margin-top: 5px; }

    /* --- ENGINE PANEL --- */
    .engine-panel {
      background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
      border-radius: 28px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .custom-select {
      width: 100%; background: #05000a; border: 1px solid var(--glass-border);
      color: #fff; padding: 1rem; border-radius: 16px; margin-bottom: 1.2rem; outline: none;
    }

    .btn-group { display: flex; gap: 10px; }
    .btn { padding: 1rem; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; flex: 1; }
    .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid rgba(255, 77, 77, 0.2); }
    .btn-accent { background: var(--accent); color: #fff; }

    .search-input {
      width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
      padding: 1.2rem; border-radius: 18px; color: #fff; margin-bottom: 1.5rem; outline: none;
    }

    .list-box { border-radius: 24px; background: var(--glass); border: 1px solid var(--glass-border); overflow: hidden; }
    .user-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem; border-bottom: 1px solid var(--glass-border);
    }
    .u-mob { font-weight: 700; font-size: 1.1rem; color: #fff; }
    .u-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
    .badge-owner { background: var(--owner); color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }

    /* --- MODALS --- */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(15px); display: none; align-items: center;
      justify-content: center; z-index: 5000; padding: 1.2rem;
    }
    .modal.active { display: flex; }
    .modal-card { background: #0a0a0f; border: 1px solid var(--glass-border); padding: 2.2rem; border-radius: 32px; width: 100%; max-width: 400px; }

    .fab {
      position: fixed; bottom: 30px; right: 20px;
      width: 65px; height: 65px; background: var(--accent);
      border-radius: 22px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 2rem;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); z-index: 999;
    }

    .toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: var(--cyan); color: #000; padding: 0.8rem 1.5rem;
      border-radius: 12px; font-weight: 800; z-index: 9999; transition: 0.5s;
    }
    .toast.show { top: 20px; }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="main-loader"><div class="loader-glow"></div><p style="margin-top:15px; font-size:0.8rem; color:var(--cyan);">CONNECTING ENGINE...</p></div>

<!-- TABS -->
<div class="top-nav" id="dbTabs">
  <button class="btn btn-accent" style="width:auto; padding:0 20px; border-radius:15px;" onclick="openModal('addDbModal')">+</button>
</div>

<div class="container">
  <div class="logo-header">CYBER ADMIN PRO</div>

  <div class="stats-row">
    <div class="stat-card"><span>TOTAL RECORDS</span><h2 id="totalCount">0</h2></div>
    <div class="stat-card"><span>BRANDS</span><h2 id="brandCount">0</h2></div>
  </div>

  <div class="engine-panel">
    <select id="brandSelect" class="custom-select" onchange="renderUI()"></select>
    <div class="btn-group">
      <button class="btn btn-danger" onclick="startPurge(100)">100</button>
      <button class="btn btn-danger" onclick="startPurge(500)">500</button>
      <button class="btn btn-danger" style="flex:2; background:var(--danger); color:#fff;" onclick="startPurge('ALL')">PURGE ALL</button>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-input" placeholder="Search Mobile..." oninput="renderUI()">

  <div id="userList" class="list-box"></div>
</div>

<div class="fab" onclick="openModal('addOwnerModal')">+</div>

<!-- MODAL: ADD DB -->
<div class="modal" id="addDbModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1.5rem;">Add New Database</h2>
    <input type="text" id="dbName" class="search-input" placeholder="Admin Name">
    <input type="text" id="dbUrl" class="search-input" placeholder="Firebase URL">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="saveDb()">CONNECT</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('addDbModal')">CLOSE</button>
    </div>
  </div>
</div>

<!-- MODAL: RENAME DB -->
<div class="modal" id="renameModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1.5rem;">Rename Admin</h2>
    <input type="text" id="editName" class="search-input">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="confirmRename()">UPDATE</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('renameModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD OWNER -->
<div class="modal" id="addOwnerModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1rem;">Add Safe Owner</h2>
    <input type="number" id="ownerMob" class="search-input" placeholder="Mobile Number">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="saveOwner()">ADD OWNER</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('addOwnerModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: PROGRESS -->
<div class="modal" id="progressModal">
  <div class="modal-card" style="text-align:center;">
    <h2 id="pgTitle">Purging...</h2>
    <div style="height:6px; background:#000; border-radius:10px; margin:20px 0; overflow:hidden;">
      <div id="pgBar" style="height:100%; width:0%; background:var(--cyan); transition:0.2s;"></div>
    </div>
    <b id="pgStats" style="color:var(--cyan); font-size:1.5rem;">0 / 0</b>
  </div>
</div>

<div class="toast" id="toast">Done</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  let configs = JSON.parse(localStorage.getItem('cyber_v4')) || [
    { name: 'Admin 1', url: 'https://funultimate-345ed-default-rtdb.firebaseio.com' }
  ];
  
  let currentIdx = 0;
  let rawData = [];
  let dbRef = null;
  let isPurging = false;
  let editTarget = null;

  // --- HIDE LOADER FAILSAFE ---
  setTimeout(() => {
    const loader = document.getElementById('main-loader');
    if(loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }
  }, 4000); // 4 Seconds max loading

  function init() {
    renderTabs();
    switchDb(0);
    syncBackground();
  }

  function renderTabs() {
    const container = document.getElementById('dbTabs');
    container.querySelectorAll('.admin-pill').forEach(p => p.remove());
    
    configs.forEach((db, i) => {
      const pill = document.createElement('div');
      pill.className = `admin-pill ${i === currentIdx ? 'active' : ''}`;
      pill.onclick = () => switchDb(i);
      pill.innerHTML = `
        <div class="pill-actions">
          <span class="icon-btn" onclick="openRename(${i}, event)">✎</span>
          <span class="icon-btn" style="color:var(--danger)" onclick="deleteDb(${i}, event)">✕</span>
        </div>
        <span class="name">${db.name}</span>
        <span class="count" id="count-pill-${i}">0 Nos</span>
      `;
      container.insertBefore(pill, container.firstChild);
    });
  }

  function syncBackground() {
    configs.forEach((conf, i) => {
      try {
        const appName = `app_${i}`;
        let app = firebase.apps.find(a => a.name === appName) || firebase.initializeApp({ databaseURL: conf.url }, appName);
        app.database().ref("dbRef").on("value", snap => {
          const count = snap.numChildren();
          const el = document.getElementById(`count-pill-${i}`);
          if(el) el.innerText = count.toLocaleString() + " Nos";
          if(i === currentIdx) updateMain(snap.val());
        });
      } catch(e) { console.error("Firebase Error"); }
    });
  }

  function switchDb(idx) {
    if(isPurging) return;
    currentIdx = idx;
    
    if(dbRef) dbRef.off();
    
    const app = firebase.apps.find(a => a.name === `app_${idx}`);
    if(app) {
      dbRef = app.database().ref("dbRef");
      renderTabs();
    }
    
    const loader = document.getElementById('main-loader');
    if(loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }
  }

  function updateMain(data) {
    rawData = [];
    const brands = new Set();
    if(data) {
      for(let k in data) {
        rawData.push({ id: k, ...data[k] });
        if(data[k].brand && data[k].brand !== 'Owner') brands.add(data[k].brand);
      }
    }
    rawData.reverse();
    
    document.getElementById('totalCount').innerText = rawData.length.toLocaleString();
    document.getElementById('brandCount').innerText = brands.size;

    const select = document.getElementById('brandSelect');
    const oldVal = select.value;
    select.innerHTML = '<option value="">All Brands</option>';
    [...brands].sort().forEach(b => {
      const count = rawData.filter(u => u.brand === b).length;
      select.innerHTML += `<option value="${b}">${b} (${count})</option>`;
    });
    select.value = oldVal;
    renderUI();
  }

  function renderUI() {
    const list = document.getElementById('userList');
    const term = document.getElementById('searchBox').value.toLowerCase();
    const brand = document.getElementById('brandSelect').value;

    let filtered = rawData;
    if(brand) filtered = filtered.filter(u => u.brand === brand);
    if(term) filtered = filtered.filter(u => u.mobile.includes(term));

    const slice = filtered.slice(0, 50);
    list.innerHTML = slice.length ? slice.map(u => `
      <div class="user-row">
        <div>
          <span class="u-mob">${u.mobile} ${u.brand === 'Owner' ? '<span class="badge-owner">SAFE</span>' : ''}</span>
          <div class="u-sub">${u.ip || '0.0.0.0'} • <span style="color:var(--cyan)">${u.brand || 'USER'}</span></div>
        </div>
        <button class="btn-danger" style="padding:6px 15px; width:auto;" 
          ${u.brand === 'Owner' ? 'disabled' : ''} onclick="deleteSingle('${u.id}')">
          ${u.brand === 'Owner' ? 'SAFE' : 'DEL'}
        </button>
      </div>
    `).join('') : '<p style="padding:4rem; text-align:center; color:var(--text-dim);">NO DATA</p>';
  }

  async function startPurge(limit) {
    const brand = document.getElementById('brandSelect').value;
    let targets = rawData.filter(u => u.brand !== 'Owner');
    if(brand) targets = targets.filter(u => u.brand === brand);
    if(limit !== 'ALL') targets = targets.slice(0, limit);

    if(!targets.length || !confirm("Purge entries?")) return;

    isPurging = true;
    openModal('progressModal');
    for(let i=0; i<targets.length; i+=100) {
      const chunk = targets.slice(i, i+100);
      const updates = {};
      chunk.forEach(u => updates[u.id] = null);
      await dbRef.update(updates);
      document.getElementById('pgBar').style.width = ((i+chunk.length)/targets.length)*100 + "%";
      document.getElementById('pgStats').innerText = `${i+chunk.length} / ${targets.length}`;
    }
    isPurging = false;
    closeModal('progressModal');
    showToast("Purged!");
  }

  function saveDb() {
    const n = document.getElementById('dbName').value.trim();
    const u = document.getElementById('dbUrl').value.trim();
    if(n && u) {
      configs.push({ name: n, url: u });
      localStorage.setItem('cyber_v4', JSON.stringify(configs));
      location.reload();
    }
  }

  function openRename(idx, e) {
    e.stopPropagation(); editTarget = idx;
    document.getElementById('editName').value = configs[idx].name;
    openModal('renameModal');
  }

  function confirmRename() {
    const n = document.getElementById('editName').value.trim();
    if(n) {
      configs[editTarget].name = n;
      localStorage.setItem('cyber_v4', JSON.stringify(configs));
      location.reload();
    }
  }

  function deleteDb(idx, e) {
    e.stopPropagation();
    if(configs.length > 1 && confirm("Delete DB?")) {
      configs.splice(idx, 1);
      localStorage.setItem('cyber_v4', JSON.stringify(configs));
      location.reload();
    }
  }

  function saveOwner() {
    const m = document.getElementById('ownerMob').value.trim();
    if(m && dbRef) {
      dbRef.child(m).set({ mobile: m, brand: "Owner", ip: "Safe", time: new Date().toLocaleString(), balance: "0", battery: "100%" });
      showToast("Owner Added"); closeModal('addOwnerModal');
    }
  }

  async function deleteSingle(id) {
    if(confirm("Delete?")) await dbRef.child(id).remove();
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

  init();
</script>
</body>
</html>
