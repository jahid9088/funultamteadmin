<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💎 CYBER ADMIN | ULTIMATE PRE-MAX</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg: #03000a;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #8b5cf6;
      --accent-glow: #6d28d9;
      --cyan: #06b6d4;
      --danger: #ff4d4d;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --owner: #fbbf24;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg); color: var(--text); overflow-x: hidden;
      background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #03000a 70%);
      min-height: 100vh;
    }

    /* --- PREMIUM LOADER --- */
    #main-loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: 0.5s ease-out;
    }
    .loader-glow {
      width: 50px; height: 50px; border: 3px solid var(--glass-border);
      border-top: 3px solid var(--cyan); border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 15px var(--cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- TOP NAV TABS --- */
    .top-nav {
      position: sticky; top: 0; z-index: 1000;
      padding: 1rem; background: rgba(3, 0, 10, 0.7);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--glass-border);
      display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none;
    }
    .top-nav::-webkit-scrollbar { display: none; }

    .admin-pill {
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 0.7rem 1.2rem; border-radius: 18px; min-width: 140px;
      position: relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0;
      cursor: pointer;
    }
    .admin-pill.active {
      background: rgba(139, 92, 246, 0.2);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
      transform: scale(1.05);
    }
    .admin-pill .name { font-weight: 800; font-size: 0.9rem; color: #fff; display: block; }
    .admin-pill .count { font-size: 0.75rem; color: var(--cyan); font-weight: 700; font-family: 'Space Grotesk'; }
    
    .pill-actions { position: absolute; top: 6px; right: 8px; display: flex; gap: 8px; opacity: 0; }
    .admin-pill:hover .pill-actions { opacity: 1; }
    .icon-btn { font-size: 0.75rem; color: #fff; background: #000; padding: 2px 6px; border-radius: 6px; }

    /* --- DASHBOARD ELEMENTS --- */
    .container { padding: 1.5rem; }
    .logo-header { 
      font-family: 'Space Grotesk'; font-weight: 800; font-size: 1.6rem;
      background: linear-gradient(to right, #fff, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 1.2rem; border-radius: 22px; backdrop-filter: blur(10px);
    }
    .stat-card span { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1.5px; font-weight: 700; }
    .stat-card h2 { font-size: 1.8rem; font-family: 'Space Grotesk'; color: #fff; margin-top: 5px; }

    /* --- ENGINE PANEL --- */
    .engine-panel {
      background: linear-gradient(145deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.05));
      border: 1px solid var(--glass-border); border-radius: 28px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .custom-select {
      width: 100%; background: #05000a; border: 1px solid var(--glass-border);
      color: #fff; padding: 1rem; border-radius: 16px; margin-bottom: 1.2rem; outline: none;
    }

    .btn-group { display: flex; gap: 10px; }
    .btn {
      padding: 1rem; border-radius: 16px; border: none; font-weight: 800;
      cursor: pointer; transition: 0.3s; flex: 1;
    }
    .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid rgba(255, 77, 77, 0.2); }
    .btn-danger:active { background: var(--danger); color: #fff; }
    .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

    /* --- SEARCH & LIST --- */
    .search-input {
      width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
      padding: 1.2rem; border-radius: 18px; color: #fff; margin-bottom: 1.5rem; outline: none;
    }
    .search-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }

    .list-box { border-radius: 24px; background: var(--glass); border: 1px solid var(--glass-border); overflow: hidden; }
    .user-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem; border-bottom: 1px solid var(--glass-border);
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .u-mob { font-weight: 700; font-size: 1.1rem; color: #fff; }
    .u-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
    .badge-owner { background: var(--owner); color: #000; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }

    /* --- MODALS --- */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px); display: none; align-items: center;
      justify-content: center; z-index: 5000; padding: 1.2rem;
    }
    .modal.active { display: flex; }
    .modal-card {
      background: #0a0a0f; border: 1px solid var(--glass-border);
      padding: 2.2rem; border-radius: 32px; width: 100%; max-width: 400px;
    }

    .fab {
      position: fixed; bottom: 30px; right: 20px;
      width: 65px; height: 65px; background: var(--accent);
      border-radius: 22px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 2rem;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); z-index: 999;
    }

    .toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: var(--cyan); color: #000; padding: 0.8rem 1.5rem;
      border-radius: 14px; font-weight: 800; z-index: 9999; transition: 0.5s;
    }
    .toast.show { top: 20px; }
  </style>
</head>
<body>

<div id="main-loader"><div class="loader-glow"></div></div>

<div class="top-nav" id="dbTabs">
  <button class="btn btn-accent" style="width:auto; padding:0 18px; border-radius:15px; flex:none;" onclick="openModal('addDbModal')">+</button>
</div>

<div class="container">
  <div class="logo-header">CYBER ADMIN PRO</div>

  <div class="stats-row">
    <div class="stat-card"><span>DATABASE RECORDS</span><h2 id="totalCount">0</h2></div>
    <div class="stat-card"><span>ACTIVE BRANDS</span><h2 id="brandCount">0</h2></div>
  </div>

  <div class="engine-panel">
    <p style="font-size: 0.7rem; font-weight: 800; color: var(--cyan); margin-bottom: 12px; letter-spacing: 2px;">VAPORIZER BATCH SYSTEM</p>
    <select id="brandSelect" class="custom-select" onchange="renderUI()"></select>
    <div class="btn-group">
      <button class="btn btn-danger" onclick="startPurge(100)">100</button>
      <button class="btn btn-danger" onclick="startPurge(500)">500</button>
      <button class="btn btn-danger" style="flex:2; background:var(--danger); color:#fff;" onclick="startPurge('ALL')">PURGE ALL</button>
    </div>
  </div>

  <input type="text" id="searchBox" class="search-input" placeholder="Instant Turbo Search..." oninput="renderUI()">

  <div id="userList" class="list-box"></div>
</div>

<div class="fab" onclick="openModal('addOwnerModal')">+</div>

<!-- MODAL: ADD DB -->
<div class="modal" id="addDbModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1.5rem; font-family:'Space Grotesk';">Add New Sector</h2>
    <input type="text" id="dbName" class="search-input" placeholder="Admin Name" style="margin-bottom:10px;">
    <input type="text" id="dbUrl" class="search-input" placeholder="Firebase URL" style="margin-bottom:1.5rem;">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="saveDb()">CONNECT</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('addDbModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: RENAME DB -->
<div class="modal" id="renameModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1.5rem; font-family:'Space Grotesk';">Rename Sector</h2>
    <input type="text" id="editName" class="search-input" style="margin-bottom:1.5rem;">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="confirmRename()">UPDATE</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('renameModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD OWNER -->
<div class="modal" id="addOwnerModal">
  <div class="modal-card">
    <h2 style="margin-bottom:1rem; font-family:'Space Grotesk';">Add Safe Owner</h2>
    <p style="color:var(--text-dim); font-size:0.8rem; margin-bottom:1.5rem;">Protected from all bulk deletions.</p>
    <input type="number" id="ownerMob" class="search-input" placeholder="Mobile Number" style="margin-bottom:1.5rem;">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="saveOwner()">ADD OWNER</button>
      <button class="btn" style="background:#222; color:#fff;" onclick="closeModal('addOwnerModal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- MODAL: PROGRESS -->
<div class="modal" id="progressModal">
  <div class="modal-card" style="text-align:center;">
    <h2 id="pgTitle" style="font-family:'Space Grotesk';">Vaporizing...</h2>
    <div style="height:6px; background:#000; border-radius:10px; margin:20px 0; overflow:hidden;">
      <div id="pgBar" style="height:100%; width:0%; background:var(--cyan); box-shadow:0 0 15px var(--cyan); transition:0.2s;"></div>
    </div>
    <b id="pgStats" style="color:var(--cyan); font-size:1.5rem; font-family:'Space Grotesk';">0 / 0</b>
  </div>
</div>

<div class="toast" id="toast">Done</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  let configs = JSON.parse(localStorage.getItem('cyber_v3')) || [
    { name: 'Admin 1', url: 'https://funultimate-345ed-default-rtdb.firebaseio.com' }
  ];
  
  let currentIdx = 0;
  let rawData = [];
  let dbRef = null;
  let isPurging = false;
  let editTarget = null;

  // --- START ENGINE ---
  function init() {
    renderTabs();
    switchDb(0);
    syncBackground();
  }

  // Pehle Tabs Render Honge (Anti-Loading Logic)
  function renderTabs() {
    const container = document.getElementById('dbTabs');
    container.querySelectorAll('.admin-pill').forEach(p => p.remove());
    
    configs.forEach((db, i) => {
      const pill = document.createElement('div');
      pill.className = `admin-pill ${i === currentIdx ? 'active' : ''}`;
      pill.onclick = () => switchDb(i);
      pill.innerHTML = `
        <div class="pill-actions">
          <span class="icon-btn" onclick="openRename(${i}, event)">✎</span>
          <span class="icon-btn" style="color:var(--danger)" onclick="deleteDb(${i}, event)">✕</span>
        </div>
        <span class="name">${db.name}</span>
        <span class="count" id="count-pill-${i}">Wait...</span>
      `;
      container.insertBefore(pill, container.firstChild);
    });
  }

  // Background Sync for All DBs
  function syncBackground() {
    configs.forEach((conf, i) => {
      try {
        const appName = `app_${i}`;
        let app = firebase.apps.find(a => a.name === appName) || firebase.initializeApp({ databaseURL: conf.url }, appName);
        app.database().ref("dbRef").on("value", snap => {
          const count = snap.numChildren();
          const el = document.getElementById(`count-pill-${i}`);
          if(el) el.innerText = count.toLocaleString() + " Nos";
          if(i === currentIdx) updateMain(snap.val());
        });
      } catch(e) {
        const el = document.getElementById(`count-pill-${i}`);
        if(el) el.innerText = "Error";
      }
    });
  }

  function switchDb(idx) {
    if(isPurging) return;
    currentIdx = idx;
    const conf = configs[idx];
    
    if(dbRef) dbRef.off();
    
    const app = firebase.apps.find(a => a.name === `app_${idx}`);
    dbRef = app.database().ref("dbRef");
    
    renderTabs();
    document.getElementById('main-loader').style.opacity = '0';
    setTimeout(() => document.getElementById('main-loader').style.display = 'none', 500);
    showToast(`Accessing Sector: ${conf.name}`);
  }

  function updateMain(data) {
    if(!data) { rawData = []; renderUI(); return; }
    const temp = [];
    const brands = new Set();
    for(let k in data) {
      temp.push({ id: k, ...data[k] });
      if(data[k].brand && data[k].brand !== 'Owner') brands.add(data[k].brand);
    }
    rawData = temp.reverse();
    
    document.getElementById('totalCount').innerText = rawData.length.toLocaleString();
    document.getElementById('brandCount').innerText = brands.size;

    const select = document.getElementById('brandSelect');
    const oldVal = select.value;
    select.innerHTML = '<option value="">Global Engine (All Data)</option>';
    [...brands].sort().forEach(b => {
      const count = rawData.filter(u => u.brand === b).length;
      select.innerHTML += `<option value="${b}">${b} (${count})</option>`;
    });
    select.value = oldVal;
    renderUI();
  }

  function renderUI() {
    const list = document.getElementById('userList');
    const term = document.getElementById('searchBox').value.toLowerCase();
    const brand = document.getElementById('brandSelect').value;

    let filtered = rawData;
    if(brand) filtered = filtered.filter(u => u.brand === brand);
    if(term) filtered = filtered.filter(u => u.mobile.includes(term) || (u.ip && u.ip.includes(term)));

    const slice = filtered.slice(0, 50);
    
    if(slice.length === 0) {
      list.innerHTML = '<p style="padding:4rem; text-align:center; color:var(--text-dim);">NO SECTOR DATA</p>';
      return;
    }

    list.innerHTML = slice.map(u => {
      const isOwner = u.brand === 'Owner';
      return `
        <div class="user-row">
          <div>
            <span class="u-mob">${u.mobile} ${isOwner ? '<span class="badge-owner">SAFE</span>' : ''}</span>
            <div class="u-sub">${u.ip || '0.0.0.0'} • <span style="color:var(--cyan)">${u.brand || 'USER'}</span></div>
          </div>
          <button class="btn-danger" style="padding:6px 15px; width:auto; font-size:0.75rem;" 
            ${isOwner ? 'disabled' : ''} onclick="deleteSingle('${u.id}')">
            ${isOwner ? 'IMMUNE' : 'PURGE'}
          </button>
        </div>
      `;
    }).join('');
  }

  // --- TURBO PURGE ---
  async function startPurge(limit) {
    const brand = document.getElementById('brandSelect').value;
    let targets = rawData.filter(u => u.brand !== 'Owner');
    
    if(brand) targets = targets.filter(u => u.brand === brand);
    if(limit !== 'ALL') targets = targets.slice(0, limit);

    if(!targets.length) return showToast("No targets found");
    if(!confirm(`SYSTEM ALERT: Purge ${targets.length} entries?`)) return;

    isPurging = true;
    openModal('progressModal');
    
    const total = targets.length;
    const batch = 200;
    for(let i=0; i<targets.length; i+=batch) {
      const chunk = targets.slice(i, i+batch);
      const updates = {};
      chunk.forEach(u => updates[u.id] = null);
      await dbRef.update(updates);
      
      const done = Math.min(i + batch, total);
      document.getElementById('pgBar').style.width = (done/total)*100 + "%";
      document.getElementById('pgStats').innerText = `${done} / ${total}`;
    }

    isPurging = false;
    closeModal('progressModal');
    showToast("Vaporization Complete");
  }

  // --- ADMIN MANAGEMENT ---
  function saveDb() {
    const name = document.getElementById('dbName').value.trim();
    const url = document.getElementById('dbUrl').value.trim();
    if(!name || !url) return;
    configs.push({ name, url });
    localStorage.setItem('cyber_v3', JSON.stringify(configs));
    location.reload();
  }

  function openRename(idx, e) {
    e.stopPropagation();
    editTarget = idx;
    document.getElementById('editName').value = configs[idx].name;
    openModal('renameModal');
  }

  function confirmRename() {
    const n = document.getElementById('editName').value.trim();
    if(!n) return;
    configs[editTarget].name = n;
    localStorage.setItem('cyber_v3', JSON.stringify(configs));
    location.reload();
  }

  function deleteDb(idx, e) {
    e.stopPropagation();
    if(configs.length === 1) return showToast("Min 1 Sector Required");
    if(!confirm("Destroy this sector permanently?")) return;
    configs.splice(idx, 1);
    localStorage.setItem('cyber_v3', JSON.stringify(configs));
    location.reload();
  }

  // --- HELPERS ---
  function saveOwner() {
    const m = document.getElementById('ownerMob').value.trim();
    if(!m) return;
    dbRef.child(m).set({
      mobile: m, brand: "Owner", ip: "Safe_Sector",
      time: new Date().toLocaleString(), balance: "0", battery: "100%"
    });
    showToast("Safe Owner Secured");
    closeModal('addOwnerModal');
  }

  async function deleteSingle(id) {
    if(confirm("Confirm Purge?")) await dbRef.child(id).remove();
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  
  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
